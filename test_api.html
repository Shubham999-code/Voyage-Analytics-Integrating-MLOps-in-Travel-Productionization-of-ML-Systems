<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test Client</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f5; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .method { background: #ff6c37; color: white; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin-right: 10px; }
        .url { font-family: monospace; font-size: 16px; background: #eee; padding: 5px 10px; border-radius: 4px; flex-grow: 1; }
        textarea { width: 100%; height: 150px; font-family: monospace; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 10px; font-size: 16px; font-weight: bold;}
        button:hover { background: #0056b3; }
        .response-area { margin-top: 20px; background: #282c34; color: #abb2bf; padding: 15px; border-radius: 4px; font-family: monospace; white-space: pre-wrap; min-height: 50px;}
        .status { margin-bottom: 10px; font-weight: bold; }
        .status-200 { color: #98c379; }
        .status-error { color: #e06c75; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="method">POST</span>
            <span class="url">http://localhost:5000/predict</span>
        </div>
        
        <h3 style="margin-bottom: 5px;">Body (JSON)</h3>
        <textarea id="requestBody">{
  "flightType": "economic",
  "time": 1.5,
  "distance": 500,
  "agency": "FlyingCo",
  "from": "New York",
  "to": "London"
}</textarea>
        
        <button id="sendBtn" onclick="sendRequest()">Send Request</button>

        <h3 style="margin-top: 25px; margin-bottom: 5px;">Response</h3>
        <div class="response-area" id="responseArea">Waiting for request...</div>
    </div>

    <script>
        async function sendRequest() {
            const btn = document.getElementById('sendBtn');
            const resArea = document.getElementById('responseArea');
            const reqBody = document.getElementById('requestBody').value;
            
            btn.innerText = "Sending...";
            btn.disabled = true;
            resArea.innerHTML = "Processing...";
            
            try {
                const response = await fetch('http://localhost:5000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: reqBody
                });
                
                const data = await response.json();
                const statusClass = response.ok ? 'status-200' : 'status-error';
                
                resArea.innerHTML = `<div class="status ${statusClass}">Status: ${response.status} ${response.statusText}</div>`;
                resArea.innerHTML += JSON.stringify(data, null, 2);
                
                // Add a hidden element to signal completion to the subagent
                const doneEl = document.createElement('div');
                doneEl.id = 'test-done';
                document.body.appendChild(doneEl);
            } catch (error) {
                resArea.innerHTML = `<div class="status status-error">Error</div>${error.message}`;
            } finally {
                btn.innerText = "Send Request";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
